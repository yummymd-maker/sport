<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep - 自律给我自由</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        keep: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            400: '#4ade80',
                            500: '#24c759', // Keep brand green
                            600: '#16a34a',
                            900: '#14532d',
                        }
                    },
                    fontFamily: {
                        sans: ['"PingFang SC"', '"Hiragino Sans GB"', '"Microsoft YaHei"', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 定制滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f3f4f6; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d1d5db; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ca3af; 
        }
        .glass-nav {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0.8) 100%);
        }
        .card-gradient {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 40%, transparent 100%);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased selection:bg-keep-500 selection:text-white overflow-x-hidden">

                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/>
                </svg>
                <span class="text-2xl font-bold tracking-wider">Keep</span>
            </div>
            <div class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="#" class="hover:text-keep-400 transition-colors">首页</a>
                <a href="#courses" class="text-keep-400 transition-colors">运动课程</a>
                <a href="#" class="hover:text-keep-400 transition-colors">社区</a>
                <a href="#" class="hover:text-keep-400 transition-colors">商城</a>
            </div>
            <div>
                <button class="bg-white/20 hover:bg-keep-500 hover:text-white backdrop-blur-md border border-white/30 transition-all duration-300 px-5 py-2 rounded-full text-sm font-medium">

                </button>
            </div>
        </div>
    </nav>

    <!-- 全屏主视觉 Hero Section -->
    <header class="relative w-full h-screen flex items-center justify-center overflow-hidden">
        <!-- 背景图 -->
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&q=80&w=2000" 
             alt="Athlete Hero" 
             class="absolute inset-0 w-full h-full object-cover object-center scale-105 transform motion-safe:animate-[pulse_10s_ease-in-out_infinite_alternate]" />
        
        <!-- 渐变遮罩 -->
        <div class="absolute inset-0 hero-gradient"></div>

        <!-- 核心文案 -->
        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto mt-20 opacity-0 animate-fade-in-up">
            <h1 class="text-5xl md:text-7xl font-extrabold text-white tracking-tight mb-6 drop-shadow-lg">
                自律给我自由
            </h1>
            <p class="text-lg md:text-2xl text-gray-200 mb-10 font-light tracking-wide drop-shadow-md">
                随时随地，开启你的专属训练计划
            </p>
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="#courses" class="bg-keep-500 hover:bg-keep-600 text-white px-8 py-4 rounded-full text-lg font-semibold transition-all duration-300 transform hover:scale-105 hover:shadow-lg hover:shadow-keep-500/30 flex items-center">
                    开始训练
                    <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                </a>
                <button class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/30 text-white px-8 py-4 rounded-full text-lg font-medium transition-all duration-300 flex items-center">
                    定制计划
                </button>
            </div>
        </div>
        
        <!-- 底部渐变过渡 -->
        <div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-gray-50 to-transparent"></div>
    </header>

    <!-- 课程专区 -->
    <main id="courses" class="max-w-7xl mx-auto px-6 py-20">
        <div class="mb-12 text-center md:text-left">
            <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4 tracking-tight">精选课程推荐</h2>
            <p class="text-gray-500">跟随顶级博主，感受爆汗的快乐</p>
        </div>

        <!-- 胶囊标签分类 -->
        <div class="flex overflow-x-auto hide-scrollbar space-x-3 mb-10 pb-2">
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-gray-900 text-white text-sm font-medium transition-colors shadow-md">全部</button>
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-sm font-medium transition-all">减脂</button>
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-sm font-medium transition-all">塑形</button>
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-sm font-medium transition-all">瑜伽</button>
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-sm font-medium transition-all">HIIT</button>
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-sm font-medium transition-all">马甲线</button>
            <button class="flex-shrink-0 px-6 py-2.5 rounded-full bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-sm font-medium transition-all">零基础</button>
        </div>

        <!-- 课程卡片网格 -->
        <div id="courseGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- 卡片由 JS 动态生成 -->
        </div>
    </main>

    <!-- 视频预览模态框 -->
    <div id="videoModal" class="fixed inset-0 z-50 hidden opacity-0 transition-opacity duration-300">
        <!-- 模糊背景 -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal()"></div>
        
        <!-- 模态框内容 -->
        <div class="absolute inset-0 flex items-center justify-center p-4 sm:p-6 pointer-events-none">
            <div id="modalContent" class="bg-gray-900 rounded-2xl w-full max-w-5xl overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 pointer-events-auto border border-gray-800 flex flex-col max-h-[90vh]">
                
                <!-- 头部信息栏 -->
                <div class="flex justify-between items-start p-6 pb-4 relative z-10 bg-gradient-to-b from-gray-900 to-gray-900/90">
                    <div class="pr-12">
                        <h3 id="modalTitle" class="text-2xl sm:text-3xl font-bold text-white mb-3">课程标题</h3>
                        <div class="flex flex-wrap items-center gap-3 text-sm text-gray-400">
                            <span class="flex items-center text-keep-400 font-medium">
                                <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                                <span id="modalInstructor">博主</span>
                            </span>
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span id="modalDuration">时长</span>
                            </span>
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path></svg>
                                <span id="modalCalories">消耗</span>
                            </span>
                            <span id="modalDifficulty" class="px-2 py-0.5 rounded text-xs font-bold bg-white/10 text-white">难度</span>
                        </div>
                    </div>
                    <!-- 关闭按钮 -->
                    <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white bg-white/5 hover:bg-white/10 rounded-full p-2 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <!-- 视频播放器区域 -->
                <div class="relative bg-black aspect-video flex-shrink-0">
                    <!-- 加载状态 -->
                    <div id="videoLoader" class="absolute inset-0 flex items-center justify-center z-0">
                        <svg class="animate-spin h-8 w-8 text-keep-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                    <iframe id="courseIframe" class="w-full h-full z-10 relative bg-black" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                
                <!-- 底部操作栏 -->
                <div class="p-4 sm:p-6 bg-gray-900 border-t border-gray-800 flex justify-between items-center">
                    <p class="text-gray-400 text-sm hidden sm:block">温馨提示：运动前请做好热身，量力而行。</p>
                    <button class="w-full sm:w-auto bg-keep-500 hover:bg-keep-600 text-white px-8 py-3 rounded-full font-medium transition-colors shadow-lg shadow-keep-500/20">
                        加入训练计划
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-gray-200 mt-20 py-12">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-500 text-sm">
            <p class="mb-2">© 2026 Keep Clone - 仅供学习与演示使用</p>
            <p>自律给我自由</p>
        </div>
    </footer>

    <!-- JavaScript 逻辑 -->
    <script>
        // 导航栏滚动效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.remove('bg-black/10', 'border-white/10');
                navbar.classList.add('bg-black/80', 'border-transparent', 'shadow-md');
            } else {
                navbar.classList.add('bg-black/10', 'border-white/10');
                navbar.classList.remove('bg-black/80', 'border-transparent', 'shadow-md');
            }
        });

        // 课程数据（参考各大健身博主）
        const courses = [
            {
                id: 1,
                title: "15分钟欢乐燃脂操",
                instructor: "帕梅拉 Pamela Reif",
                duration: "15分钟",
                calories: "150千卡",
                difficulty: "K2 进阶",
                difficultyColor: "bg-blue-500/80 text-white",
                image: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1E54y1B7oZ&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 2,
                title: "本草纲目毽子操全集",
                instructor: "刘畊宏",
                duration: "30分钟",
                calories: "320千卡",
                difficulty: "K3 强化",
                difficultyColor: "bg-orange-500/80 text-white",
                image: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1vW4y1c76c&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 3,
                title: "10分钟马甲线养成",
                instructor: "周六野 Zoey",
                duration: "10分钟",
                calories: "80千卡",
                difficulty: "K1 零基础",
                difficultyColor: "bg-green-500/80 text-white",
                image: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1Mf4y1t7L8&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 4,
                title: "全程站立瘦全身",
                instructor: "韩小四",
                duration: "20分钟",
                calories: "180千卡",
                difficulty: "K2 进阶",
                difficultyColor: "bg-blue-500/80 text-white",
                image: "https://images.unsplash.com/photo-1548690312-e3b507d8c110?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1PU4y1479Z&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 5,
                title: "超燃脂 HIIT 挑战",
                instructor: "帕梅拉 Pamela Reif",
                duration: "25分钟",
                calories: "280千卡",
                difficulty: "K4 挑战",
                difficultyColor: "bg-red-500/80 text-white",
                image: "https://images.unsplash.com/photo-1517838277536-f5f99be501cd?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1ph411X7Ug&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 6,
                title: "晨间唤醒瑜伽",
                instructor: "周六野 Zoey",
                duration: "15分钟",
                calories: "60千卡",
                difficulty: "K1 零基础",
                difficultyColor: "bg-green-500/80 text-white",
                image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1PV411v7Ej&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 7,
                title: "哑铃塑形全身循环",
                instructor: "帕梅拉 Pamela Reif",
                duration: "20分钟",
                calories: "210千卡",
                difficulty: "K3 强化",
                difficultyColor: "bg-orange-500/80 text-white",
                image: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1s9wFzPEYM&autoplay=1&high_quality=1&danmaku=0"
            },
            {
                id: 8,
                title: "无下蹲护膝燃脂操",
                instructor: "周六野 Zoey",
                duration: "12分钟",
                calories: "110千卡",
                difficulty: "K1 零基础",
                difficultyColor: "bg-green-500/80 text-white",
                image: "https://images.unsplash.com/photo-1518609878373-06d740f60d8b?auto=format&fit=crop&q=80&w=800",
                embedUrl: "//player.bilibili.com/player.html?bvid=BV1rb411x7W5&autoplay=1&high_quality=1&danmaku=0"
            }
        ];

        // 渲染卡片
        const courseGrid = document.getElementById('courseGrid');
        
        courses.forEach(course => {
            const card = document.createElement('div');
            card.className = "group relative rounded-2xl overflow-hidden cursor-pointer bg-white shadow-sm hover:shadow-2xl transition-all duration-500 transform hover:-translate-y-1";
            card.onclick = () => openModal(course);
            
            card.innerHTML = `
                <!-- 封面图与悬停放大效果 -->
                <div class="relative aspect-[4/5] overflow-hidden">
                    <img src="${course.image}" alt="${course.title}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                    
                    <!-- 底部渐变以突出文字 -->
                    <div class="absolute inset-0 card-gradient opacity-80 group-hover:opacity-100 transition-opacity duration-300"></div>
                    
                    <!-- 播放图标悬停显示 -->
                    <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <div class="w-14 h-14 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30 text-white">
                            <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    
                    <!-- 标签信息 -->
                    <div class="absolute top-4 left-4">
                        <span class="px-2.5 py-1 rounded-full text-xs font-bold ${course.difficultyColor} backdrop-blur-sm shadow-sm">
                            ${course.difficulty}
                        </span>
                    </div>

                    <!-- 底部文本信息 -->
                    <div class="absolute bottom-0 left-0 w-full p-5 text-white transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
                        <h3 class="text-xl font-bold mb-2 leading-tight drop-shadow-md">${course.title}</h3>
                        <p class="text-sm text-gray-200 mb-3 flex items-center font-medium">
                            <svg class="w-4 h-4 mr-1 text-keep-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path></svg>
                            ${course.instructor}
                        </p>
                        <div class="flex items-center space-x-4 text-xs text-gray-300 font-medium">
                            <span class="flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${course.duration}
                            </span>
                            <span class="flex items-center">
                                <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path></svg>
                                ${course.calories}
                            </span>
                        </div>
                    </div>
                </div>
            `;
            courseGrid.appendChild(card);
        });

        // 模态框逻辑
        const modal = document.getElementById('videoModal');
        const modalContent = document.getElementById('modalContent');
        const iframe = document.getElementById('courseIframe');
        const videoLoader = document.getElementById('videoLoader');

        function openModal(course) {
            // 填充数据
            document.getElementById('modalTitle').textContent = course.title;
            document.getElementById('modalInstructor').textContent = course.instructor;
            document.getElementById('modalDuration').textContent = course.duration;
            document.getElementById('modalCalories').textContent = course.calories;
            
            const diffEl = document.getElementById('modalDifficulty');
            diffEl.textContent = course.difficulty;
            // 清除旧颜色，应用新颜色（简单处理：覆盖类名）
            diffEl.className = `px-2 py-0.5 rounded text-xs font-bold ${course.difficultyColor}`;

            // 设置 iframe 视频源，显示 Loading 并在 iframe 加载完成后隐藏 Loading
            videoLoader.style.display = 'flex';
            iframe.onload = () => {
                videoLoader.style.display = 'none';
            };
            iframe.src = course.embedUrl;
            
            // 显示模态框
            modal.classList.remove('hidden');
            // 触发重绘以实现过渡动画
            void modal.offsetWidth;
            
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
            
            // 锁定 body 滚动
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            // 隐藏模态框动画
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            
            // 停止视频播放（清空 iframe src）
            iframe.src = '';
            
            // 动画结束后隐藏 DOM
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
        }

        // 按 ESC 键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
